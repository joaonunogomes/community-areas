name: Validate index.json

on:
  pull_request:
    branches: [main]
    paths:
      - 'areas/**'
      - 'index.json'

permissions:
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate index.json matches area directories
        id: validate-index
        if: always()
        run: |
          errors=0
          error_messages=""

          # Get all area directories (directories containing data.json)
          for data_file in areas/*/data.json; do
            [ -f "$data_file" ] || continue
            slug="$(basename "$(dirname "$data_file")")"

            # Check area exists in index.json
            entry=$(jq -r --arg s "$slug" '.[] | select(.slug == $s)' index.json)
            if [ -z "$entry" ]; then
              msg="Area directory '$slug' has no entry in index.json"
              echo "::error::$msg"
              error_messages="$error_messages- $msg\n"
              errors=$((errors + 1))
              continue
            fi

            # Compare boulderCount
            actual_count=$(jq '.boulders | length' "$data_file")
            index_count=$(jq -r --arg s "$slug" '.[] | select(.slug == $s) | .boulderCount' index.json)
            if [ "$actual_count" != "$index_count" ]; then
              msg="boulderCount mismatch for '$slug': index.json has $index_count, data.json has $actual_count boulders"
              echo "::error::$msg"
              error_messages="$error_messages- $msg\n"
              errors=$((errors + 1))
            fi

            # Compare name
            actual_name=$(jq -r '.name' "$data_file")
            index_name=$(jq -r --arg s "$slug" '.[] | select(.slug == $s) | .name' index.json)
            if [ "$actual_name" != "$index_name" ]; then
              msg="name mismatch for '$slug': index.json has '$index_name', data.json has '$actual_name'"
              echo "::error::$msg"
              error_messages="$error_messages- $msg\n"
              errors=$((errors + 1))
            fi

            # Compare country
            actual_country=$(jq -r '.country' "$data_file")
            index_country=$(jq -r --arg s "$slug" '.[] | select(.slug == $s) | .country' index.json)
            if [ "$actual_country" != "$index_country" ]; then
              msg="country mismatch for '$slug': index.json has '$index_country', data.json has '$actual_country'"
              echo "::error::$msg"
              error_messages="$error_messages- $msg\n"
              errors=$((errors + 1))
            fi

            # Compare city
            actual_city=$(jq -r '.city' "$data_file")
            index_city=$(jq -r --arg s "$slug" '.[] | select(.slug == $s) | .city' index.json)
            if [ "$actual_city" != "$index_city" ]; then
              msg="city mismatch for '$slug': index.json has '$index_city', data.json has '$actual_city'"
              echo "::error::$msg"
              error_messages="$error_messages- $msg\n"
              errors=$((errors + 1))
            fi

            # Compare type
            actual_type=$(jq -r '.type' "$data_file")
            index_type=$(jq -r --arg s "$slug" '.[] | select(.slug == $s) | .type' index.json)
            if [ "$actual_type" != "$index_type" ]; then
              msg="type mismatch for '$slug': index.json has '$index_type', data.json has '$actual_type'"
              echo "::error::$msg"
              error_messages="$error_messages- $msg\n"
              errors=$((errors + 1))
            fi

            # Compare status
            actual_status=$(jq -r '.status' "$data_file")
            index_status=$(jq -r --arg s "$slug" '.[] | select(.slug == $s) | .status' index.json)
            if [ "$actual_status" != "$index_status" ]; then
              msg="status mismatch for '$slug': index.json has '$index_status', data.json has '$actual_status'"
              echo "::error::$msg"
              error_messages="$error_messages- $msg\n"
              errors=$((errors + 1))
            fi

            # Check status is valid (DRAFT or READY)
            if [ "$index_status" != "DRAFT" ] && [ "$index_status" != "READY" ]; then
              msg="Invalid 'status' for '$slug': must be 'DRAFT' or 'READY', got '$index_status'"
              echo "::error::$msg"
              error_messages="$error_messages- $msg\n"
              errors=$((errors + 1))
            fi

            # Check version exists and is a positive integer
            version=$(jq -r --arg s "$slug" '.[] | select(.slug == $s) | .version' index.json)
            if [ -z "$version" ] || [ "$version" = "null" ]; then
              msg="Missing 'version' for '$slug' in index.json"
              echo "::error::$msg"
              error_messages="$error_messages- $msg\n"
              errors=$((errors + 1))
            elif ! echo "$version" | grep -qE '^[1-9][0-9]*$'; then
              msg="Invalid 'version' for '$slug': must be a positive integer, got '$version'"
              echo "::error::$msg"
              error_messages="$error_messages- $msg\n"
              errors=$((errors + 1))
            fi

            echo "✓ $slug — OK"
          done

          # Check for orphan entries in index.json (slug with no directory)
          for slug in $(jq -r '.[].slug' index.json); do
            if [ ! -f "areas/$slug/data.json" ]; then
              msg="index.json has entry '$slug' but no 'areas/$slug/data.json' exists"
              echo "::error::$msg"
              error_messages="$error_messages- $msg\n"
              errors=$((errors + 1))
            fi
          done

          # Save errors to file for the comment step
          printf "%b" "$error_messages" >> "$RUNNER_TEMP/validation_errors.txt"

          if [ "$errors" -gt 0 ]; then
            echo ""
            echo "Found $errors error(s). Please update index.json to match your area data."
            exit 1
          fi

          echo ""
          echo "All areas validated successfully."

      - name: Validate version bump for changed areas
        id: validate-version
        if: always()
        run: |
          errors=0
          error_messages=""
          base_ref="${{ github.event.pull_request.base.sha }}"

          # Get list of changed files compared to base
          changed_files=$(git diff --name-only "$base_ref"...HEAD)

          # Collect slugs of areas that have changes (files inside areas/ directory)
          changed_slugs=()
          for file in $changed_files; do
            # Skip files not inside the areas/ directory
            [[ "$file" == areas/* ]] || continue
            # Extract slug (second path component)
            slug="${file#areas/}"
            slug="${slug%%/*}"
            # Only consider it an area if it has a data.json
            [ -f "areas/$slug/data.json" ] || continue
            # Deduplicate
            if [[ ! " ${changed_slugs[*]} " =~ " ${slug} " ]]; then
              changed_slugs+=("$slug")
            fi
          done

          for slug in "${changed_slugs[@]}"; do
            # Get current version from PR branch
            current_version=$(jq -r --arg s "$slug" '.[] | select(.slug == $s) | .version' index.json)

            # Get base version from base branch
            base_version=$(git show "$base_ref":index.json | jq -r --arg s "$slug" '.[] | select(.slug == $s) | .version // 0')

            if [ "$base_version" = "null" ] || [ -z "$base_version" ]; then
              base_version=0
            fi

            expected_version=$((base_version + 1))

            if [ "$current_version" != "$expected_version" ]; then
              msg="Area '$slug' has changes but version was not bumped correctly. Expected version $expected_version (was $base_version), got $current_version"
              echo "::error::$msg"
              error_messages="$error_messages- $msg\n"
              errors=$((errors + 1))
            else
              echo "✓ $slug — version bumped $base_version → $current_version"
            fi
          done

          if [ "${#changed_slugs[@]}" -eq 0 ]; then
            echo "No area directories were changed."
          fi

          # Save errors to file for the comment step
          printf "%b" "$error_messages" >> "$RUNNER_TEMP/validation_errors.txt"

          if [ "$errors" -gt 0 ]; then
            echo ""
            echo "Found $errors error(s). Please bump the 'version' field in index.json by 1 for each changed area."
            exit 1
          fi

          echo ""
          echo "All version bumps validated successfully."

      - name: Validate image file sizes (max 300KB)
        id: validate-image-size
        if: always()
        run: |
          max_bytes=307200
          errors=0
          error_messages=""

          while IFS= read -r img; do
            size=$(stat --format="%s" "$img")
            if [ "$size" -gt "$max_bytes" ]; then
              size_kb=$(( (size + 1023) / 1024 ))
              msg="Image '$img' is ${size_kb}KB, exceeds 300KB limit"
              echo "::error::$msg"
              error_messages="$error_messages- $msg\n"
              errors=$((errors + 1))
            fi
          done < <(find ./areas -path '*/images/*' -type f)

          # Save errors to file for the comment step
          printf "%b" "$error_messages" >> "$RUNNER_TEMP/validation_errors.txt"

          if [ "$errors" -gt 0 ]; then
            echo ""
            echo "Found $errors image(s) exceeding the 300KB size limit."
            exit 1
          fi

          echo "All images are within the 300KB size limit."

      - name: Validate images are JPG format
        id: validate-image-format
        if: always()
        run: |
          errors=0
          error_messages=""

          # Check for non-JPG files in images directories
          while IFS= read -r img; do
            ext="${img##*.}"
            ext_lower=$(echo "$ext" | tr '[:upper:]' '[:lower:]')
            if [ "$ext_lower" != "jpg" ] && [ "$ext_lower" != "jpeg" ]; then
              msg="Image '$img' is not a JPG file. Only .jpg/.jpeg images are allowed."
              echo "::error::$msg"
              error_messages="$error_messages- $msg\n"
              errors=$((errors + 1))
            fi
          done < <(find ./areas -path '*/images/*' -type f)

          # Save errors to file for the comment step
          printf "%b" "$error_messages" >> "$RUNNER_TEMP/validation_errors.txt"

          if [ "$errors" -gt 0 ]; then
            echo ""
            echo "Found $errors non-JPG image(s). Please convert them to JPG format."
            exit 1
          fi

          echo "All images are in JPG format."

      - name: Comment on PR with validation errors
        if: always() && (steps.validate-index.outcome == 'failure' || steps.validate-version.outcome == 'failure' || steps.validate-image-size.outcome == 'failure' || steps.validate-image-format.outcome == 'failure')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const errorsFile = `${process.env.RUNNER_TEMP}/validation_errors.txt`;
            let errorDetails = '';
            if (fs.existsSync(errorsFile)) {
              errorDetails = fs.readFileSync(errorsFile, 'utf8').trim();
            }

            const sections = [];

            if ('${{ steps.validate-index.outcome }}' === 'failure') {
              sections.push('### Index Validation\nThe `index.json` file is out of sync with the area data files.');
            }
            if ('${{ steps.validate-version.outcome }}' === 'failure') {
              sections.push('### Version Bump\nAreas with changes need their `version` field bumped by 1 in `index.json`.');
            }
            if ('${{ steps.validate-image-size.outcome }}' === 'failure') {
              sections.push('### Image Size\nSome images exceed the 300KB size limit.');
            }
            if ('${{ steps.validate-image-format.outcome }}' === 'failure') {
              sections.push('### Image Format\nOnly `.jpg`/`.jpeg` images are allowed in `images/` directories.');
            }

            let body = '## Validation Failed\n\n' + sections.join('\n\n');

            if (errorDetails) {
              body += '\n\n### Error Details\n' + errorDetails;
            }

            // Find and update existing bot comment, or create a new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '<!-- validation-bot -->';
            body = marker + '\n' + body;

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Remove validation comment on success
        if: always() && steps.validate-index.outcome == 'success' && steps.validate-version.outcome == 'success' && steps.validate-image-size.outcome == 'success' && steps.validate-image-format.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '<!-- validation-bot -->';
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
            }
